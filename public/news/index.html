<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News | Kang Tutor</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: sans-serif;
}

body {
    background: #f5f5f5;
    line-height: 1.6;
}

/* HEADER */
header {
    width: 100%;
    height: 70px;
    background: #02a28f;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}

.nav-container {
    width: 90%;
    max-width: 1200px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* MAIN CONTAINER */
.container {
    max-width: 900px;
    margin: 30px auto;
    padding: 20px;
}

/* ARTICLE */
.article {
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 30px;
}

.article img {
    max-width: 100%;
    margin: 10px 0;
    border-radius: 8px;
}

.article .title {
    font-size: 26px;
    font-weight: bold;
    margin-bottom: 10px;
}

.article .meta {
    font-size: 13px;
    color: #666;
    margin-bottom: 15px;
}

/* MEDIA GALLERY */
#media {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
}

#media img {
    max-width: 200px;
    border-radius: 8px;
}

/* MOBILE */
@media(max-width: 768px) {
    .container {
        padding: 10px;
    }
}
</style>
</head>

<body>

<header>
    <div class="nav-container">
        <h1>Kang Tutor</h1>
    </div>
</header>

<div class="container">
    <div class="article" id="article">
        <div class="title" id="title"></div>
        <div class="meta" id="meta"></div>
        <div class="content" id="content"></div>
        <div id="media"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
